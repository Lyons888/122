:2}]},{id:6,title:"自我评价弹窗",illustrationDesc:"【插画描述】：一面镜子。镜子里的小人左边是一个头戴皇冠、闪闪发光的自己，右边则是一个被红色叉叉覆盖、写着“失败者”、“没用”标签的扭曲影子。",options:[{key:"A",label:"正向滤镜",description:"我觉得自己挺好的，犯错时也能原谅自己。",score:0},{key:"B",label:"现实模式",description:"我知道自己有不完美的地方，但总体还行。",score:1},{key:"C",label:"否定弹窗",description:"我总觉得自己没做好，对不起别人，甚至觉得自己是个累赘或失败者。",score:2}]}];function Kk({className:r="w-24 h-24"}){return p.jsxs("div",{className:`relative flex items-center justify-center ${r}`,children:[p.jsx(V.div,{animate:{scale:[1,1.15,1]},transition:{duration:3,repeat:1/0,ease:"easeInOut"},className:"absolute w-4/5 h-4/5 rounded-full bg-amber-400/20 blur-xl"}),p.jsxs(V.svg,{viewBox:"0 0 100 100",className:"w-full h-full relative z-10",fill:"none",children:[p.jsx("defs",{children:p.jsxs("linearGradient",{id:"sunGrad",x1:"0%",y1:"0%",x2:"100%",y2:"100%",children:[p.jsx("stop",{offset:"0%",stopColor:"#FBBF24"}),p.jsx("stop",{offset:"100%",stopColor:"#F59E0B"})]})}),p.jsx(V.g,{animate:{rotate:360},transition:{duration:25,repeat:1/0,ease:"linear"},style:{originX:"50px",originY:"50px"},children:[...Array(8)].map((a,o)=>{const l=o*360/8;return p.jsx("line",{x1:"50",y1:"12",x2:"50",y2:"2",stroke:"url(#sunGrad)",strokeWidth:"4",strokeLinecap:"round",transform:`rotate(${l} 50 50)`},o)})}),p.jsx("circle",{cx:"50",cy:"50",r:"24",fill:"url(#sunGrad)"})]})]})}function Zk({className:r="w-24 h-24"}){return p.jsx("div",{className:`relative flex items-center justify-center ${r}`,children:p.jsxs(V.svg,{viewBox:"0 0 100 100",className:"w-full h-full",fill:"none",children:[p.jsxs("defs",{children:[p.jsxs("linearGradient",{id:"cloudGrad",x1:"0%",y1:"0%",x2:"0%",y2:"100%",children:[p.jsx("stop",{offset:"0%",stopColor:"#E2E8F0"}),p.jsx("stop",{offset:"100%",stopColor:"#94A3B8"})]}),p.jsxs("linearGradient",{id:"sunBehindGrad",x1:"0%",y1:"0%",x2:"100%",y2:"100%",children:[p.jsx("stop",{offset:"0%",stopColor:"#FBBF24"}),p.jsx("stop",{offset:"100%",stopColor:"#F59E0B"})]})]}),p.jsx(V.circle,{cx:"62",cy:"38",r:"16",fill:"url(#sunBehi
